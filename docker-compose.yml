services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mealoday}
      POSTGRES_USER:     ${POSTGRES_USER:-mealoday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealoday}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-mealoday}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mealoday}
      NODE_ENV: production
      APP_RELEASE:             ${APP_RELEASE:-}
      APP_MAINTENANCE:         ${APP_MAINTENANCE:-}
      APP_MAINTENANCE_BYPASS:  ${APP_MAINTENANCE_BYPASS:-}
      CLOUDINARY_CLOUD_NAME:   ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:      ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:   ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER:       ${CLOUDINARY_FOLDER:-mealoday}
      PEXELS_API_KEY:          ${PEXELS_API_KEY:-}
      GEMINI_API_KEY:          ${GEMINI_API_KEY:-}
      GEMINI_MODEL:            ${GEMINI_MODEL:-}
      CRON_SECRET:             ${CRON_SECRET:-}

volumes:
  postgres_data:
